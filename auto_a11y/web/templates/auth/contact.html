{% extends "base.html" %}

{% block title %}{{ _('Contact Us') }} - {{ _('Auto A11y') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h1 class="mb-0"><i class="bi bi-envelope" aria-hidden="true"></i> {{ _('Contact Us') }}</h1>
            </div>
            <div class="card-body">
                <p>{{ _('To request access to Auto A11y, please contact your administrator.') }}</p>
            </div>
            <div class="card-footer text-center">
                <a href="{{ url_for('auth.login') }}">{{ _('Back to Login') }}</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
